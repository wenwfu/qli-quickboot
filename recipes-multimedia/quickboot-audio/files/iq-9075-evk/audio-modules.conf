# This configuration file is placed in '/etc/modules-load.d/'
# to force kernel to load audio drivers explicitly during
# early boot.
#
# By defining modules in a layered dependency order, it
# prevents delays caused by resolving module dependencies
# dynamically during udev hardware detection.

# --- LAYER 0: Base buses and IPC mechanisms ---
# No audio dependencies yet
soundcore
soundwire-bus
qcom_pil_info
mdt_loader
qmi_helpers
snd-q6dsp-common
rpmsg_char
qcom_glink_smem

# --- LAYER 0.5: QRTR (Qualcomm Router) - CRITICAL for IPCRTR ---
qrtr
qrtr-smd

# --- LAYER 1: depends on Layer 0 ---
snd
qcom_pdr_msg
qcom_sysmon
rpmsg_ctrl

# --- LAYER 2: depends on Layer 1 ---
snd-timer
pdr_interface
qcom_q6v5
qcom_common

# --- LAYER 3: depends on Layer 2 ---
snd-pcm
qcom_q6v5_pas
apr

# --- LAYER 4: depends on Layer 3 ---
snd-compress
fastrpc

# --- LAYER 5: depends on Layer 4 ---
snd-soc-core

# --- LAYER 5.5: Q6APM core (depends on apr + snd-soc-core) ---
snd-q6apm

# --- LAYER 6: depends on Layer 5 ---
snd-soc-dmic
snd-soc-max98357a
snd-soc-hdmi-codec
snd-soc-qcom-common
snd-soc-qcom-sdw
q6apm-dai
q6apm-lpass-dais

# --- LAYER 7:
# Final/Top level Audio Drivers / Machine drivers
snd-soc-sc8280xp
audioreach_driver
